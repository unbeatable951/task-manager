<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager — My Tasks</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f1f5f9;
      font-family: 'Segoe UI', sans-serif;
      color: #1e293b;
    }

    /* ── Navbar ── */
    nav {
      background: #1B3A6B;
      color: #fff;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand { font-size: 20px; font-weight: 700; }
    nav .user-info { display: flex; align-items: center; gap: 14px; font-size: 14px; }
    nav .user-info span { opacity: 0.85; }
    nav button.logout {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    nav button.logout:hover { background: rgba(255,255,255,0.25); }

    /* ── Main layout ── */
    main {
      max-width: 700px;
      margin: 36px auto;
      padding: 0 16px;
    }

    /* ── Stats bar ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stat-card .num  { font-size: 28px; font-weight: 700; color: #2563EB; }
    .stat-card .lbl  { font-size: 12px; color: #64748b; margin-top: 2px; }
    .stat-card.done .num  { color: #16a34a; }
    .stat-card.pend .num  { color: #d97706; }

    /* ── Add task card ── */
    .add-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }
    .add-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #374151; }
    .add-row { display: flex; gap: 10px; }
    .add-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-row input:focus { border-color: #2563EB; }
    .add-row button {
      background: #2563EB;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .add-row button:hover { background: #1B3A6B; }

    /* ── Filter tabs ── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn.active { background: #2563EB; color: #fff; border-color: #2563EB; }

    /* ── Task list ── */
    .task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
      animation: fadeIn 0.25s ease;
    }
    .task-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .task-item.completed { opacity: 0.65; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

    /* Custom checkbox */
    .task-check {
      appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #d1d5db;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
    }
    .task-check:checked {
      background: #16a34a;
      border-color: #16a34a;
    }
    .task-check:checked::after {
      content: '✓';
      position: absolute;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .task-title {
      flex: 1;
      font-size: 15px;
      color: #1e293b;
    }
    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .status-badge.done { background: #dcfce7; color: #166534; }
    .status-badge.pend { background: #fef3c7; color: #92400e; }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 18px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .delete-btn:hover { color: #ef4444; }

    /* Submit all button */
    .submit-bar {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .submit-btn {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #15803d; }

    .empty {
      text-align: center;
      padding: 48px 0;
      color: #94a3b8;
      font-size: 15px;
    }
    .empty .icon { font-size: 40px; display: block; margin-bottom: 10px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e293b;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <div class="brand">✅ TaskManager</div>
    <div class="user-info">
      <span>👤 <strong id="navUser"></strong></span>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </nav>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="num" id="statTotal">0</div>
        <div class="lbl">Total Tasks</div>
      </div>
      <div class="stat-card done">
        <div class="num" id="statDone">0</div>
        <div class="lbl">Completed</div>
      </div>
      <div class="stat-card pend">
        <div class="num" id="statPend">0</div>
        <div class="lbl">Pending</div>
      </div>
    </div>

    <!-- Add Task -->
    <div class="add-card">
      <h2>Add New Task</h2>
      <div class="add-row">
        <input type="text" id="taskInput" placeholder="Enter task title..." maxlength="120"/>
        <button onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn"        onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn"        onclick="setFilter('completed',this)">Completed</button>
    </div>

    <!-- Task List -->
    <div class="task-list" id="taskList"></div>

    <!-- Submit Bar -->
    <div class="submit-bar">
      <button class="submit-btn" onclick="submitAll()">💾 Submit All Changes</button>
    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    const API = "http://127.0.0.1:8000";

    // Guard: redirect to login if not authenticated
    const userId   = localStorage.getItem('user_id');
    const username = localStorage.getItem('username');
    if (!userId) window.location.href = 'index.html';
    document.getElementById('navUser').textContent = username;

    let tasks = [];          // all tasks from server
    let pendingChanges = {}; // { taskId: completed (bool) }
    let currentFilter = 'all';

    // ── Load tasks ─────────────────────────────────────────────────────────
    async function loadTasks() {
      try {
        const res  = await fetch(`${API}/tasks/${userId}`);
        tasks = await res.json();
        pendingChanges = {};
        renderTasks();
      } catch {
        showToast('Could not load tasks — is the server running?');
      }
    }

    // ── Render ─────────────────────────────────────────────────────────────
    function renderTasks() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      let filtered = tasks;
      if (currentFilter === 'completed') filtered = tasks.filter(t => t.completed);
      if (currentFilter === 'pending')   filtered = tasks.filter(t => !t.completed);

      // Stats
      document.getElementById('statTotal').textContent = tasks.length;
      document.getElementById('statDone').textContent  = tasks.filter(t => t.completed).length;
      document.getElementById('statPend').textContent  = tasks.filter(t => !t.completed).length;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">
          <span class="icon">🗂️</span>
          No tasks here yet. Add one above!
        </div>`;
        return;
      }

      filtered.forEach(task => {
        // Use pending state if user has toggled but not submitted yet
        const checked = pendingChanges.hasOwnProperty(task.id)
          ? pendingChanges[task.id]
          : task.completed;

        const div = document.createElement('div');
        div.className = `task-item ${checked ? 'completed' : ''}`;
        div.innerHTML = `
          <input type="checkbox"
                 class="task-check"
                 ${checked ? 'checked' : ''}
                 onchange="toggleTask(${task.id}, this.checked)" />
          <span class="task-title">${escapeHtml(task.title)}</span>
          <span class="status-badge ${checked ? 'done' : 'pend'}">
            ${checked ? 'Complete' : 'Pending'}
          </span>
          <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete">🗑</button>
        `;
        list.appendChild(div);
      });
    }

    // ── Toggle (local only — saved on Submit) ──────────────────────────────
    function toggleTask(id, checked) {
      pendingChanges[id] = checked;

      // Re-render just the visual state
      const taskIdx = tasks.findIndex(t => t.id === id);
      if (taskIdx !== -1) {
        // Temporarily update for render
        const orig = tasks[taskIdx].completed;
        tasks[taskIdx].completed = checked;
        renderTasks();
        tasks[taskIdx].completed = orig;  // restore so pendingChanges is the truth
      }
    }

    // ── Add task ───────────────────────────────────────────────────────────
    async function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      if (!title) return showToast('Please enter a task title.');

      try {
        await fetch(`${API}/tasks/${userId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });
        input.value = '';
        await loadTasks();
        showToast('Task added!');
      } catch {
        showToast('Failed to add task.');
      }
    }

    // ── Submit all pending changes ─────────────────────────────────────────
    async function submitAll() {
      if (Object.keys(pendingChanges).length === 0) {
        return showToast('No changes to submit.');
      }
      try {
        const updates = Object.entries(pendingChanges).map(([id, completed]) =>
          fetch(`${API}/tasks/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ completed })
          })
        );
        await Promise.all(updates);
        await loadTasks();
        showToast('✅ All changes saved!');
      } catch {
        showToast('Failed to save changes.');
      }
    }

    // ── Delete task ────────────────────────────────────────────────────────
    async function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      try {
        await fetch(`${API}/tasks/${id}`, { method: 'DELETE' });
        await loadTasks();
        showToast('Task deleted.');
      } catch {
        showToast('Failed to delete task.');
      }
    }

    // ── Filter ─────────────────────────────────────────────────────────────
    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    // ── Logout ─────────────────────────────────────────────────────────────
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // Allow Enter to add task
    document.getElementById('taskInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // Init
    loadTasks();
  </script>
</body>
</html>
